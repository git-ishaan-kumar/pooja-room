<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pooja Room</title>
    <link rel="icon" type="image/svg+xml" href="static/assets/icons/icon.svg">
    <!-- Montserrat & Roboto Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="navbar-container"></header>

    <main class="dashboard-container">
        <!-- Section 1 & 2: Greeting -->
        <section class="greeting-section">
            <h1 id="greeting-text">Good morning, User.</h1>
            <p class="date-subtitle" id="date-text">Today is Monday, April 20</p>
        </section>

        <!-- Today's Parayana Section (Rendered via JS) -->
        <div id="today-section" style="display: none;">
            <div class="section-header">
                <h2>Today's Parayana</h2>
                <div class="section-divider"></div>
            </div>
            <div class="today-grid" id="today-grid">
                <!-- Big Cards Injected Here -->
            </div>
        </div>

        <!-- Later This Week Section (Rendered via JS) -->
        <div id="later-section" style="display: none;">
            <div class="section-header later-header">
                <h2>Later This Week</h2>
                <a href="schedule.html" class="btn-outline">Edit Schedule</a>
            </div>
            <div class="later-grid" id="later-grid">
                <!-- Small Cards Injected Here -->
            </div>
        </div>

        <!-- Empty State (Rendered via JS) -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <img src="static/assets/icons/daily-prayers.svg" alt="Empty Schedule">
            <p class="empty-text">Your schedule is empty.</p>
            <a href="schedule.html" class="btn-primary empty-btn">Setup Schedule</a>
        </div>
    </main>

    <!-- Project Config & Client -->
    <script src="config.js"></script>
    <script src="navbar.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Auth Guard
            const { data: { session } } = await window.supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const user = session.user;
            const displayName = user.user_metadata.display_name || 'Devotee';

            // 2. Greeting Logic
            const greetingText = document.getElementById('greeting-text');
            const dateText = document.getElementById('date-text');
            
            const now = new Date();
            const hour = now.getHours();
            let timeOfDay = "evening";
            
            if (hour >= 5 && hour < 12) timeOfDay = "morning";
            else if (hour >= 12 && hour < 17) timeOfDay = "afternoon";
            
            greetingText.textContent = `Good ${timeOfDay}, ${displayName}.`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dateText.textContent = `Today is ${now.toLocaleDateString('en-US', options)}`;

            // 3. Fetch Schedule Data (Step 7)
            const { data: profile, error: profileError } = await window.supabase
                .from('profiles')
                .select('schedule')
                .eq('id', user.id)
                .single();

            if (profileError) {
                console.error("Error fetching profile:", profileError.message);
                // Handle case where profile might not exist yet (though trigger should handle it)
                return;
            }

            const schedule = profile.schedule || {
                "Monday": [], "Tuesday": [], "Wednesday": [], "Thursday": [], 
                "Friday": [], "Saturday": [], "Sunday": []
            };
            
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const todayName = days[now.getDay()];

            console.log("Schedule fetched for:", todayName, schedule);

            // 4. Check for Empty State (Step 8 prep)
            const hasAnyPrayers = Object.values(schedule).some(dayArr => dayArr.length > 0);
            
            if (!hasAnyPrayers) {
                document.getElementById('empty-state').style.display = 'flex';
                return;
            }

            // 5. Render Step 8 (Filtering and Rendering)
            const categoryIconMap = {
                "Ganesha Stotrams": "ganesha-stotrams.svg",
                "Shiva Stotrams": "shiva-stotrams.svg",
                "Vishnu Stotrams": "vishnu-stotrams.svg",
                "Sri Rama Stotrams": "sri-rama-stotrams.svg",
                "Sri Krishna Stotrams": "sri-krishna-stotrams.svg",
                "Hanuma Stotrams": "hanuma-stotrams.svg",
                "Devi Stotrams": "devi-stotrams.svg",
                "Durga Stotrams": "durga-stotrams.svg",
                "Lakshmi Stotrams": "lakshmi-stotrams.svg",
                "Saraswati Stotrams": "saraswati-stotrams.svg",
                "Surya Bhagavan Stotrams": "surya-bhagavan-stotrams.svg",
                "Subrahmanya Swamy Stotrams": "subrahmanya-swamy-stotrams.svg",
                "Daily Prayers": "daily-prayers.svg",
                "Nitya Parayana Slokas": "nitya-parayana-slokas.svg",
                "Ashtakams": "ashtakams.svg",
                "Adi Shankaracharya Stotrams": "adi-shankaracharya-stotrams.svg"
            };

            // Collect all unique IDs from the entire schedule to fetch details once
            const allScheduledIds = [...new Set(Object.values(schedule).flat())];
            
            if (allScheduledIds.length === 0) {
                document.getElementById('empty-state').style.display = 'flex';
                return;
            }

            const { data: prayers, error: prayersError } = await window.supabase
                .from('library')
                .select('id, title, category')
                .in('id', allScheduledIds);

            if (prayersError) {
                console.error("Error fetching prayers:", prayersError.message);
                return;
            }

            // Create a lookup map for prayer details
            const prayerMap = prayers.reduce((acc, p) => ({ ...acc, [p.id]: p }), {});

            // A. Render Today's Parayana (Big Cards)
            const todayIds = schedule[todayName] || [];
            const todayGrid = document.getElementById('today-grid');
            const todaySection = document.getElementById('today-section');

            if (todayIds.length > 0) {
                todaySection.style.display = 'block';
                todayIds.forEach(id => {
                    const prayer = prayerMap[id];
                    if (!prayer) return;

                    const icon = categoryIconMap[prayer.category] || 'icon.svg';
                    const card = document.createElement('div');
                    card.className = 'card-big';
                    card.innerHTML = `
                        <div class="card-top">
                            <img src="static/assets/icons/${icon}" alt="${prayer.category}">
                            <span class="category-tag">${prayer.category}</span>
                        </div>
                        <h3 class="card-title">${prayer.title}</h3>
                        <a href="prayer.html?id=${prayer.id}&from=dashboard" class="btn-primary w-full" style="text-align: center;">Start Praying</a>
                    `;
                    todayGrid.appendChild(card);
                });
            }

            // B. Render Later This Week (Small Cards)
            const laterGrid = document.getElementById('later-grid');
            const laterSection = document.getElementById('later-section');
            let hasLaterPrayers = false;

            // Sort days starting from tomorrow
            const tomorrowIdx = (now.getDay() + 1) % 7;
            const dayOrder = [];
            for (let i = 0; i < 6; i++) {
                dayOrder.push(days[(tomorrowIdx + i) % 7]);
            }

            dayOrder.forEach(day => {
                const dayIds = schedule[day] || [];
                if (dayIds.length > 0) {
                    hasLaterPrayers = true;
                    dayIds.forEach(id => {
                        const prayer = prayerMap[id];
                        if (!prayer) return;

                        const icon = categoryIconMap[prayer.category] || 'icon.svg';
                        const card = document.createElement('div');
                        card.className = 'card-small';
                        card.innerHTML = `
                            <img src="static/assets/icons/${icon}" alt="${prayer.category}">
                            <div class="card-small-content">
                                <span class="day-label">${day}</span>
                                <span class="small-title">${prayer.title}</span>
                            </div>
                        `;
                        laterGrid.appendChild(card);
                    });
                }
            });

            if (hasLaterPrayers) {
                laterSection.style.display = 'block';
            }

            // If neither today nor later has prayers (should be covered by hasAnyPrayers, but safe-check)
            if (todayIds.length === 0 && !hasLaterPrayers) {
                document.getElementById('empty-state').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
